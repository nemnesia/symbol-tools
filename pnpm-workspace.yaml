packages:
  - packages/*
  - apps/*

allowBuilds:
  '@nestjs/core': true
  '@openapitools/openapi-generator-cli': true
  esbuild: true

ignoredBuiltDependencies:
  - '@nestjs/core'
  - '@openapitools/openapi-generator-cli'
  - argon2

minimumReleaseAgeExclude:
  - '@nemnesia/symbol-websocket@0.2.2'

onlyBuiltDependencies:
  - esbuild
